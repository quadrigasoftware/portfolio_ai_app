ktor:
  application:
    modules:
      - com.quadrigasoftware.portfolio_ai.ApplicationKt.module
  deployment:
    port: 8080

auth:
  session:
    secret: ${SESSION_SECRET:-00112233445566778899aabbccddeeff}
  allowList:
    emails:
      - "charles@quadrigasoftware.com"
      - "aanya.iyer@quadrigasoftware.com"
      - "amina.el-amin@quadrigasoftware.com"
  #    domains:
  #      - "quadrigasoftware.com"
  providers:
    google:
      clientId: ${GOOGLE_CLIENT_ID:-}
      clientSecret: ${GOOGLE_CLIENT_SECRET:-}
      authorizeUrl: "https://accounts.google.com/o/oauth2/auth"
      accessTokenUrl: "https://accounts.google.com/o/oauth2/token"
      scopes:
        - "openid"
        - "profile"
        - "email"
        - "https://www.googleapis.com/auth/admin.directory.user.readonly"
      extraAuthParameters:
        prompt: "select_account"
    entra:
      clientId: ${ENTRA_CLIENT_ID:-}
      clientSecret: ${ENTRA_CLIENT_SECRET:-}
      authorizeUrl: "https://login.microsoftonline.com/common/oauth2/v2.0/authorize"
      accessTokenUrl: "https://login.microsoftonline.com/common/oauth2/v2.0/token"
    okta:
      clientId: ${OKTA_CLIENT_ID:-}
      clientSecret: ${OKTA_CLIENT_SECRET:-}
      authorizeUrl: "https://${OKTA_DOMAIN:-}/oauth2/default/v1/authorize"
      accessTokenUrl: "https://${OKTA_DOMAIN:-}/oauth2/default/v1/token"
    mock:
      enabled: true
  features:
    leaderboard: ${FEATURE_LEADERBOARD:-true}
    orgChart: ${FEATURE_ORG_CHART:-true}
    search: ${FEATURE_SEARCH:-true}
    directoryCache: ${FEATURE_CACHE:-true}
